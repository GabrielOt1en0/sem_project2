<!DOCTYPE html>
<html>

<head>
    <style>
        .topnav {
            overflow: hidden;
           
        }

        .topnav a {
            float: left;
            color: white;
            text-align: center;
            padding: 14px 16px;
            font-size: 17px;
        }

        .topnav a:hover {
            color: white;
        }

        .topnav a.active {
            background-color: red;
            color: white;
        }

        .subnav {
            float: left;
            overflow: hidden;
        }

        .subnav .subnavbtn {
            font-size: 17px;
            border: none;
            outline: none;
            color: white;
            padding: 14px 16px;
            background-color: inherit;
            font-family: inherit;
            margin: 0;
        }

        .subnav-content {
            display: none;
            position: inherit;
            left: 0;
            background-color: white;
            width: 100%;
            z-index: 1;
        }

        .navbar a:hover,
        .subnav:hover .subnavbtn {
            
        }

        .subnav-content a:hover {
            background-color: #eee;
            color: black;
        }

        .subnav:hover .subnav-content {
            display: block;
        }

        body {
            background-image: url('C:/Web/project/Free Photo _ Beautiful skyscape during daytime.jpg');
            background-repeat: no-repeat;
            background-size: cover;
        }
    </style>
</head>
